name: Morning Apartment Scrape

on:
  schedule:
    # Runs at 15:00 UTC every day, which is 8:00 AM PDT (Los Angeles time)
    - cron: '0 15 * * *'
  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  run-watcher:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests beautifulsoup4

      - name: Run Watcher Script
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python bartlein_watcher.py
        
      - name: Commit Hash Update
        # This step saves the updated hash file back to your repo so tomorrow's run can compare against it
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          git add bartlein_hash.txt
          git commit -m "Update Bartlein hash" || exit 0
          git push